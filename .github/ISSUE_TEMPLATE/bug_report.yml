name: Bug report
description: Report a reproducible problem in CodePi.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve CodePi. Remove credentials and personal paths from logs and screenshots.
  - type: input
    id: version
    attributes:
      label: CodePi version or commit
      placeholder: v0.2.0 or a commit SHA
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: macOS version, Mac architecture, Node.js version, and `pi --version`.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      placeholder: Tell us the smallest reliable sequence that triggers the problem.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add sanitized logs or screenshots if useful.
