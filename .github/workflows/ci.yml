name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm run build:web

  swift-shell:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - run: swift build
        working-directory: macos
      - run: swift test
        working-directory: macos
